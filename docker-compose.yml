services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOMAIN=troviio.com
      - CRAWL4AI_URL=http://crawl4ai:11235
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./data:/data
    depends_on:
      - redis
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.picksy-api.rule=(Host(`troviio.com`) || Host(`www.troviio.com`)) && PathPrefix(`/api`) && !PathPrefix(`/api/newsletter`) && !PathPrefix(`/api/affiliate`)"
      - "traefik.http.routers.picksy-api.entrypoints=websecure"
      - "traefik.http.routers.picksy-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.picksy-api.loadbalancer.server.url=http://127.0.0.1:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: "https://uukshxztoztkwxuuvqzc.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_MtlnW7iC23FprNIUrISnZg_6IN8erpB"
        NEXT_PUBLIC_API_URL: "https://troviio.com/api"
        NEXT_PUBLIC_APP_URL: "https://troviio.com"
        NEXT_PUBLIC_AMAZON_TAG: "troviio-21"
        RESEND_API_KEY: "${RESEND_API_KEY}"
    environment:
      SUPABASE_SERVICE_KEY: "${SUPABASE_SERVICE_KEY}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
    env_file: .env
    restart: always
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.picksy-web.rule=(Host(`troviio.com`) || Host(`www.troviio.com`)) && (!PathPrefix(`/api`) || PathPrefix(`/api/newsletter`) || PathPrefix(`/api/affiliate`))"
      - "traefik.http.routers.picksy-web.entrypoints=websecure"
      - "traefik.http.routers.picksy-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.picksy-web.loadbalancer.server.url=http://127.0.0.1:3000"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: always
    volumes:
      - ./backend:/app

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: always
    volumes:
      - ./backend:/app

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data

  crawl4ai:
    image: unclecode/crawl4ai:latest
    restart: unless-stopped
    ports:
      - "11235:11235"
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
